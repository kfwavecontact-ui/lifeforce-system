services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifeforce-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    expose:
      - "9000"
    depends_on:
      - redis

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifeforce-queue
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis

  nginx:
    image: nginx:latest
    container_name: lifeforce-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  redis:
    image: redis:latest
    container_name: lifeforce-redis
    expose:
      - "6379"
